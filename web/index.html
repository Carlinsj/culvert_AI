<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Culvert AI Field Review</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="styles.css?v=20260617-mobile-app" />
  </head>
  <body>
    <main class="app-shell">
      <aside id="mobile-sidebar" class="sidebar" aria-label="Culvert candidates">
        <section class="brand">
          <button id="mobile-sidebar-close" class="mobile-sidebar-close" type="button" aria-label="Close list and filters">
            Close
          </button>
          <p class="eyebrow">Ulster County Pilot</p>
          <h1>Culvert AI Field Review</h1>
          <p id="backend-status" class="backend-status">Checking backend</p>
          <div class="summary-grid" aria-label="Summary statistics">
            <div>
              <span id="total-count">0</span>
              <label>candidates</label>
            </div>
            <div>
              <span id="visible-count">0</span>
              <label>visible</label>
            </div>
            <div>
              <span id="max-score">0</span>
              <label>top estimate</label>
            </div>
            <div>
              <span id="field-label-count">0</span>
              <label>field matches</label>
            </div>
          </div>
          <p id="model-quality" class="model-quality">Model quality pending</p>
        </section>

        <section class="list-section" aria-label="Ranked candidates">
          <div class="section-title">
            <h2>Ranked locations</h2>
            <div class="section-actions">
              <button id="place-point" type="button" aria-pressed="false">Add culvert</button>
              <button
                id="toggle-filters"
                type="button"
                aria-expanded="false"
                aria-controls="filter-panel"
              >
                Filters
              </button>
              <button id="fit-visible" type="button">Fit map</button>
            </div>
          </div>

          <section id="filter-panel" class="controls" aria-label="Map filters" hidden>
            <label class="control-label" for="search-input">Search</label>
            <input id="search-input" type="search" placeholder="Road, stream, evidence" />

            <label class="control-label" for="score-range">Minimum estimate</label>
            <div class="range-row">
              <input id="score-range" type="range" min="0" max="100" value="0" />
              <output id="score-output" for="score-range">0</output>
            </div>

            <div class="bucket-row" aria-label="Priority buckets">
              <label><input type="checkbox" name="bucket" value="very_high" checked /> Very high</label>
              <label><input type="checkbox" name="bucket" value="high" checked /> High</label>
              <label><input type="checkbox" name="bucket" value="medium" checked /> Medium</label>
              <label><input type="checkbox" name="bucket" value="low" checked /> Low</label>
            </div>

            <label class="toggle-row">
              <input id="show-known" type="checkbox" />
              <span>Include known culverts in list</span>
            </label>
          </section>

          <ol id="candidate-list" class="candidate-list"></ol>
        </section>
      </aside>
      <div id="drawer-backdrop" class="drawer-backdrop" hidden></div>

      <section class="map-area" aria-label="Candidate map">
        <div class="mobile-map-bar" aria-label="Map controls">
          <button
            id="mobile-menu-toggle"
            class="mobile-menu-toggle"
            type="button"
            aria-label="Open list and filters"
            aria-expanded="false"
            aria-controls="mobile-sidebar"
          >
            <span></span>
            <span></span>
            <span></span>
          </button>
          <button id="locate-me" class="locate-me" type="button" aria-pressed="false">
            Locate me
          </button>
        </div>
        <p id="location-status" class="location-status" role="status" aria-live="polite"></p>
        <div id="map"></div>
        <article id="detail-panel" class="detail-panel" aria-live="polite" hidden>
          <div class="empty-state">Select a ranked location.</div>
        </article>
      </section>
    </main>

    <dialog id="detail-modal" class="detail-modal" aria-labelledby="detail-modal-title">
      <form method="dialog" class="detail-modal-header">
        <h2 id="detail-modal-title">Location details</h2>
        <button id="detail-modal-close" type="submit" aria-label="Close details">Close</button>
      </form>
      <div id="detail-modal-body" class="detail-modal-body"></div>
    </dialog>

    <template id="candidate-template">
      <li>
        <button type="button" class="candidate-button">
          <span class="rank"></span>
          <span class="candidate-main">
            <strong class="candidate-title"></strong>
            <span class="candidate-subtitle"></span>
          </span>
          <span class="score-pill"></span>
        </button>
      </li>
    </template>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js?v=20260617-mobile-app"></script>
  </body>
</html>
